name: Build and Release Studio

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: pdesolver-studio.exe
            asset_name: pdesolver-studio-windows.exe
          - os: macos-latest
            artifact_name: pdesolver-studio-mac.zip
            asset_name: pdesolver-studio-mac.zip
          - os: ubuntu-latest
            artifact_name: pdesolver-studio
            asset_name: pdesolver-studio-linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and Package
        run: |
          python build_studio.py

      - name: Zip macOS App
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r pdesolver-studio-mac.zip pdesolver-studio.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pdesolver-studio-windows.exe/*
            pdesolver-studio-mac.zip/*
            pdesolver-studio-linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
